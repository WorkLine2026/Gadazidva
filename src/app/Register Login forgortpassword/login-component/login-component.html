<section class="hero">
  <div class="hero-container">
    <div class="hero-side login-side">
      <div class="side-content">
        <h1 class="side-title">მოგესალმებით</h1>
        <p class="side-subtitle">
          თქვენს ანგარიშში შესასვლელად მიუთითეთ ელფოსტა და პაროლი
        </p>

        <div class="illustration">
          <svg viewBox="0 0 250 250" class="illustration-svg" aria-label="ლოგინის ილუსტრაცია">
            <rect x="50" y="60" width="150" height="120" rx="12" fill="none" stroke="#2563eb" stroke-width="3"/>
            <line x1="125" y1="180" x2="125" y2="200" stroke="#2563eb" stroke-width="3"/>
            
            <rect x="70" y="85" width="110" height="8" rx="4" fill="#2563eb" opacity="0.6"/>
            <rect x="70" y="105" width="110" height="6" rx="3" fill="#2563eb" opacity="0.4"/>
            <rect x="70" y="120" width="80" height="6" rx="3" fill="#2563eb" opacity="0.4"/>
            
            <circle cx="200" cy="80" r="18" fill="#ffffff" stroke="#f97316" stroke-width="2.5"/>
            <path d="M 200 68 Q 208 68 208 75 L 208 90 Q 208 95 203 95 Q 198 95 198 90 L 198 75 Q 198 68 206 68" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>

        <div *ngIf="errorMessage" class="error-message">
          <span class="error-icon">✕</span> {{ errorMessage }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="form">
          <div class="form-row">
            <label class="field-label">ელფოსტა</label>
            <input 
              type="email" 
              placeholder="example@domain.com" 
              class="input"
              formControlName="email"
              [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            />
            <span class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
              შეიყვანეთ სწორი ელფოსტის მისამართი
            </span>
          </div>

          <div class="form-row">
            <div class="label-wrapper">
              <label class="field-label">პაროლი</label>
              <button 
                type="button" 
                class="button-link-sm"
                (click)="goToForgotPassword()"
              >
                დაგავიწყდა პაროლი?
              </button>
            </div>
            <input 
              type="password" 
              placeholder="••••••••" 
              class="input"
              formControlName="password"
              [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            />
            <span class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
              პაროლი უნდა შეიცავდეს მინ. 6 სიმბოლოს
            </span>
          </div>

          <button 
            type="submit" 
            class="button button-primary"
            [disabled]="isLoading"
          >
            <span *ngIf="!isLoading">შესვლა</span>
            <span *ngIf="isLoading" class="loading-container">
              <span class="loading-spinner"></span> გთხოვთ დაელოდოთ...
            </span>
          </button>
        </form>

        <div class="divider">
          <span>ან გააგრძელეთ</span>
        </div>
        
        <!-- <div class="social-buttons">
          <button type="button" class="social-button fb-btn" (click)="onSocialLogin('Facebook')">
            Facebook
          </button>
          <button type="button" class="social-button google-btn" (click)="onSocialLogin('Google')">
            Google
          </button>
        </div> -->

        <div class="auth-switch">
          <span>ახალი ხართ პლატფორმაზე?</span>
          <button 
            type="button" 
            class="button button-link-inline"
            (click)="goToRegister()"
          >
            შექმენი ანგარიში
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
