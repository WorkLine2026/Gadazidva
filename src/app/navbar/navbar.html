<nav class="navbar">
  <div class="nav-container">
    <!-- ლოგო -->
    <div class="logo" (click)="navigateHome()">
      <div class="logo-icon-box">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="arrow-icon">
          <polyline points="17 11 21 7 17 3"></polyline>
          <line x1="21" y1="7" x2="9" y2="7"></line>
          <polyline points="7 13 3 17 7 21"></polyline>
          <line x1="3" y1="17" x2="15" y2="17"></line>
        </svg>
      </div>
      <span class="logo-text">Gagzavna<span class="highlight">.ge</span></span>
    </div>

    <!-- ჰამბურგერ მენიუ (მობილური) -->
    <button 
      class="hamburger" 
      #hamburger
      (click)="toggleMenu()"
      [attr.aria-label]="isMenuOpen ? 'Close menu' : 'Open menu'"
      [attr.aria-expanded]="isMenuOpen">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- ნავიგაციის გრეიპ -->
    <div class="nav-wrapper" #navWrapper>
      <!-- ნავიგაციის ლინკები -->
      <ul class="nav-links">
        <li>
          <a 
            routerLink="/" 
            routerLinkActive="active" 
            [routerLinkActiveOptions]="{ exact: true }"
            (click)="closeMenu()">
            მთავარი
          </a>
        </li>
        <li>
          <a 
            routerLink="/howtowork" 
            routerLinkActive="active"
            (click)="closeMenu()">
            როგორ მუშაობს
          </a>
        </li>
        <li>
          <a 
            routerLink="/rules" 
            routerLinkActive="active"
            (click)="closeMenu()">
            წესები
          </a>
        </li>
      </ul>

      <!-- მოქმედების ღილაკები -->
      <div class="nav-actions">
        <!-- შესვლა ღილაკი -->
        <button 
          class="btn btn-signin" 
          (click)="navigateToLogin()"
          *ngIf="!isLoggedIn">
          შესვლა
        </button>

        <!-- რეგისტრაცია ღილაკი -->
        <button 
          class="btn btn-register" 
          (click)="navigateToRegister()"
          *ngIf="!isLoggedIn">
          რეგისტრაცია
        </button>

        <!-- გაგზავნა ღილაკი -->
        <button 
          class="btn btn-primary" 
          (click)="navigateToDashboard()">
          გაგზავნა
        </button>

        <!-- რეისის დამატება ღილაკი -->
        <button 
          class="btn btn-secondary" 
          (click)="navigateToAddRide()">
          რეისის დამატება
        </button>
      </div>
    </div>
  </div>
</nav>
